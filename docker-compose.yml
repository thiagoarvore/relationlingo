services:
    app:
        build: .
        restart: always
        command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
        env_file:
            - .env
        ports:
            - 8000:8000
        depends_on:
            relationlingo_db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        volumes:
            - .:/relationlingo
            - static_volume:/relationlingo/staticfiles
            - media_data:/relationlingo/media

    relationlingo_db:
        image: postgres:latest
        ports:
            - 5433:5432
        volumes:
            - postgres_data_relationlingo:/var/lib/postgresql
        environment:
            - POSTGRES_USER=${DB_USER:-postgres}
            - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
            - POSTGRES_DB=${DB_NAME:-db}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
            interval: 10s
            timeout: 5s
            retries: 5


