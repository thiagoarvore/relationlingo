    redis:
        image: redis:latest
        container_name: redis_relationlingo
        command: >
            redis-server --port 6379 --appendonly yes
        volumes:
            - redis:/data
        ports:
            - 6379:6379
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres_data_relationlingo:
        name: postgres_data_relationlingo
    static_volume:
    redis:
    media_data:
