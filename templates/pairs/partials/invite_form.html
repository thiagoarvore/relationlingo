{% load widget_tweaks %}
<div id="invite-form-shell">
    {% if inline_success_message %}
        <div class="alert alert-success">{{ inline_success_message }}</div>
    {% endif %}

    <form
        method="post"
        novalidate
        hx-post="{% url 'pairs:invite' %}"
        hx-target="#invite-form-shell"
        hx-swap="outerHTML"
    >
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="{{ form.email.id_for_label }}">{{ form.email.label }}</label>
            {% render_field form.email class+="form-control form-control-lg" %}
            {% for error in form.email.errors %}
                <div class="text-danger small mt-1">{{ error }}</div>
            {% endfor %}
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
            <button type="submit" class="btn btn-rl-primary">Enviar convite</button>
        </div>
    </form>
</div>
