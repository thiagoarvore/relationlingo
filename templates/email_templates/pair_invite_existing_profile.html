<!doctype html>
<html lang="pt-BR">
  <body style="margin:0;padding:0;background:#f5f7fb;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f7fb;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px;max-width:100%;background:#ffffff;border-radius:12px;font-family:Arial,sans-serif;color:#1f2937;">
            <tr>
              <td style="padding:28px 28px 12px 28px;">
                <h1 style="margin:0;font-size:22px;line-height:1.3;">Voce recebeu um convite no RelationLingo</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 8px 28px;font-size:16px;line-height:1.6;">
                Oi!
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 8px 28px;font-size:16px;line-height:1.6;">
                <strong>{{ inviter_name }}</strong> te convidou para formar um par no RelationLingo.
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 20px 28px;font-size:16px;line-height:1.6;">
                Como voce ja tem perfil, basta entrar e aceitar o convite.
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px 28px;">
                <a href="{{ accept_url }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:8px;font-size:15px;">
                  Aceitar convite
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px 28px;font-size:15px;line-height:1.6;color:#4b5563;">
                Se voce nao esperava esse convite, pode ignorar este e-mail.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
